<!DOCTYPE html>
<html>
<head>
    <title>Smart Lender</title>
</head>

<body>

<h1>Smart Lender Loan Eligibility Prediction</h1>

<form action="/predict" method="POST">

Gender

<select name="Gender">
<option>Male</option>
<option>Female</option>
</select>

<br><br>

Married

<select name="Married">
<option>Yes</option>
<option>No</option>
</select>

<br><br>

Dependents

<select name="Dependents">
<option>0</option>
<option>1</option>
<option>2</option>
<option>3+</option>
</select>

<br><br>

Education

<select name="Education">
<option>Graduate</option>
<option>Not Graduate</option>
</select>

<br><br>

Self Employed

<select name="Self_Employed">
<option>Yes</option>
<option>No</option>
</select>

<br><br>

Applicant Income

<input type="number" name="ApplicantIncome">

<br><br>

Coapplicant Income

<input type="number" name="CoapplicantIncome">

<br><br>

Loan Amount

<input type="number" name="LoanAmount">

<br><br>

Loan Amount Term

<input type="number" name="Loan_Amount_Term">

<br><br>

Credit History

<select name="Credit_History">
<option value="1">1</option>
<option value="0">0</option>
</select>

<br><br>

Property Area

<select name="Property_Area">
<option>Urban</option>
<option>Semiurban</option>
<option>Rural</option>
</select>

<br><br>

<input type="submit" value="Predict">

</form>

<h2>{{ prediction }}</h2>

</body>
</html>
